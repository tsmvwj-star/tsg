<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda · 侧栏收缩点击/悬停弹出 · 互斥展开</title>
    <!-- Font Awesome 5 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            transition: background-color 0.25s ease, color 0.2s;
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        /* 主题变量 */
        body.light {
            --sidebar-bg: #0c1b2f;
            --sidebar-color: #d0e0ff;
            --sidebar-hover: #1d3557;
            --sidebar-active: #1e4d7c;
            --main-bg: #f2f4f8;
            --card-bg: #ffffff;
            --border-light: #e2ebf3;
            --text-primary: #0b2c4a;
            --text-secondary: #1f3b57;
            --log-bg: #ecf5ff;
            --log-color: #134980;
            --badge-bg: #e6f0fc;
        }

        body.dark {
            --sidebar-bg: #101624;
            --sidebar-color: #bdc9e0;
            --sidebar-hover: #262f44;
            --sidebar-active: #2f4b8a;
            --main-bg: #1a1f2b;
            --card-bg: #242936;
            --border-light: #343e4f;
            --text-primary: #e1e9f5;
            --text-secondary: #b4c8e0;
            --log-bg: #2f3b54;
            --log-color: #d1e2ff;
            --badge-bg: #2a3448;
        }

        body {
            background: var(--main-bg);
            color: var(--text-secondary);
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== 左侧边栏 - 可收缩 ===== */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
            transition: width 0.2s ease;
            overflow-y: visible;
            overflow-x: visible;
            scrollbar-width: thin;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #0a1729;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #3a5670;
            border-radius: 12px;
        }

        .sidebar-header {
            padding: 16px 16px;
            border-bottom: 1px solid #1f3a5f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            background: #1e4d7c;
            display: inline-block;
            padding: 0 8px;
            border-radius: 10px 4px 10px 4px;
            white-space: nowrap;
            transition: 0.2s;
        }

        /* 收缩时隐藏标题和颜色开关 */
        .sidebar.collapsed .sidebar-header h1,
        .sidebar.collapsed .theme-switch {
            display: none;
        }

        /* 收缩按钮始终显示 */
        .toggle-btn {
            background: #1f3a5f;
            color: #b0c7e7;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-left: auto;
        }

        .toggle-btn:hover {
            background: #2f4b8a;
            color: white;
        }

        .sidebar.collapsed .toggle-btn i {
            transform: rotate(180deg);
        }

        /* 颜色开关放在顶上左边 */
        .theme-switch {
            display: flex;
            align-items: center;
            background: #1f3a5f;
            border-radius: 30px;
            padding: 2px;
            cursor: pointer;
            margin-right: 4px;
        }

        .theme-switch span {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            color: #b0c7e7;
            transition: 0.15s;
            font-size: 0.85rem;
        }

        .theme-switch .active-theme {
            background: #f1c40f;
            color: #1e2b41;
        }

        /* 菜单组样式 */
        .menu-group {
            margin-bottom: 4px;
            position: relative;
        }

        .menu-group-title {
            padding: 16px 16px 4px 16px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #88b0dc;
            white-space: nowrap;
        }

        .sidebar.collapsed .menu-group-title {
            display: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 2px 8px;
            border-radius: 8px;
            color: var(--sidebar-color);
            font-weight: 450;
            transition: 0.2s;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
        }

        .sidebar.collapsed .menu-item {
            padding: 10px 0;
            justify-content: center;
            margin: 2px 4px;
        }

        .menu-item i {
            width: 20px;
            font-size: 1.1rem;
            color: #7da2ca;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .menu-item:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .menu-item:hover i {
            color: white;
        }

        .menu-item.active {
            background: var(--sidebar-active);
            color: white;
        }

        .menu-item.active i {
            color: white;
        }

        .menu-text {
            flex: 1;
        }

        .sidebar.collapsed .menu-text,
        .sidebar.collapsed .menu-arrow {
            display: none;
        }

        .menu-arrow {
            margin-left: auto;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .menu-item.open .menu-arrow i {
            transform: rotate(90deg);
        }

        /* 子菜单样式 - 收缩状态下通过点击/悬停弹出 */
        .submenu {
            position: absolute;
            left: 100%;
            top: 0;
            background: var(--sidebar-bg);
            border-radius: 0 12px 12px 0;
            padding: 8px 0;
            min-width: 180px;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.3);
            border-left: 1px solid #2f4b74;
            display: none;
            z-index: 1000;
        }

        /* 收缩状态下：悬停或点击都显示 */
        .sidebar.collapsed .menu-item:hover .submenu,
        .sidebar.collapsed .menu-item.active-submenu .submenu {
            display: block;
        }

        /* 非收缩状态下子菜单显示方式（点击展开） */
        .sidebar:not(.collapsed) .submenu {
            position: relative;
            left: 0;
            top: 0;
            background: transparent;
            box-shadow: none;
            border-left: 1px dashed #2f4b74;
            margin-left: 32px;
            padding-left: 12px;
            min-width: auto;
            display: none;
        }

        .sidebar:not(.collapsed) .submenu.show {
            display: block;
        }

        .sidebar:not(.collapsed) .submenu .submenu-item {
            padding: 8px 12px;
            margin: 2px 0;
        }

        .submenu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            color: var(--sidebar-color);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            white-space: nowrap;
        }

        .submenu-item i {
            width: 18px;
            font-size: 0.9rem;
            color: #7da2ca;
        }

        .submenu-item:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .submenu-item:hover i {
            color: white;
        }

        .submenu-item.active {
            background: var(--sidebar-active);
            color: white;
        }

        .submenu-item.active i {
            color: white;
        }

        /* ===== 右侧主内容区 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--main-bg);
        }

        .top-navbar {
            background: var(--card-bg);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-light);
            min-height: 52px;
        }

        .navbar-breadcrumb {
            font-weight: 500;
            color: var(--text-primary);
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-light);
        }

        .navbar-icons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .navbar-icons .icon-btn {
            background: var(--badge-bg);
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        /* 点击记录区域 */
        .click-log-panel {
            background: var(--card-bg);
            margin: 12px 20px 6px 20px;
            border-radius: 20px;
            padding: 12px 18px;
            box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 20px;
            min-height: 70px;
        }

        .click-log-panel .title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.8rem;
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-light);
        }

        .log-badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }

        .log-badge {
            background: var(--log-bg);
            color: var(--log-color);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .log-badge:hover {
            background: var(--sidebar-hover);
            color: white;
        }

        .log-badge .dismiss-btn {
            background: none;
            border: none;
            font-size: 1rem;
            color: currentColor;
            cursor: pointer;
            padding: 0 2px;
            opacity: 0.7;
        }

        .log-badge .dismiss-btn:hover {
            opacity: 1;
            color: #b22234;
        }

        /* 内容卡片 */
        .content-card {
            background: var(--card-bg);
            margin: 0 20px 20px 20px;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-light);
            flex: 1;
            overflow-y: auto;
        }

        .table-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .table-header h2 {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .table-header .badge {
            background: var(--log-bg);
            color: var(--log-color);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            background: var(--badge-bg);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .filter-item input {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 6px 14px;
            width: 180px;
            color: var(--text-primary);
        }

        .region-tag {
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-light);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .data-table th {
            text-align: left;
            padding: 12px 10px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--badge-bg);
            border-radius: 12px 12px 0 0;
            font-size: 0.85rem;
        }

        .data-table td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .badge-status {
            background: #c9e2c0;
            color: #1f582b;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .footer-note {
            margin-top: 20px;
            color: #8aa5c2;
            font-size: 0.75rem;
            border-top: 1px dashed var(--border-light);
            padding-top: 16px;
        }
    </style>
</head>

<body class="light">

                        <span class="submenu-text">关联查询</span>
                    </div>
                    <div class="submenu-item" data-path="稽核管理" data-page="audit">
                        <i class="fas fa-clipboard-check"></i>
                        <span class="submenu-text">稽核管理</span>
                    </div>
                </div>
            </div>

            <div style="height:20px;"></div>
        </div>

        <!-- 右侧主区 -->
        <div class="main">
            <div class="top-navbar">
                <div class="navbar-breadcrumb"><i class="fas fa-map-marker-alt"></i> <span
                        id="current-page-display">商户财务管理 / 总出款记录</span></div>

                <div class="navbar-icons">
                    <div class="theme-switch" id="themeToggle">
                        <span class="light-icon"><i class="fas fa-sun"></i></span>
                        <span class="dark-icon"><i class="fas fa-moon"></i></span>
                    </div>
                    <span class="icon-btn"><i class="fas fa-sliders-h"></i></span>
                    <span class="icon-btn"><i class="fas fa-bell"></i></span>
                    <span class="icon-btn"><i class="fas fa-user-cog"></i></span>
                </div>
            </div>

            <!-- 点击记录区域 -->
            <div class="click-log-panel" id="clickLogPanel">
                <div class="log-badge-container" id="logContainer"></div>
            </div>

            <!-- 内容容器 -->
            <div class="content-card" id="tableContainer">

                
            </div>
        </div>
    </div>

    <script>
        (function () {
            const logContainer = document.getElementById('logContainer');
            const tableContainer = document.getElementById('tableContainer');
            const currentPageDisplay = document.getElementById('current-page-display');
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('toggleSidebar');

            // 主题切换
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            function setTheme(theme) {
                body.className = theme;
                const lightSpan = themeToggle.querySelector('.light-icon');
                const darkSpan = themeToggle.querySelector('.dark-icon');
                if (theme === 'light') {
                    lightSpan.classList.add('active-theme');
                    darkSpan.classList.remove('active-theme');
                } else {
                    darkSpan.classList.add('active-theme');
                    lightSpan.classList.remove('active-theme');
                }
            }
            setTheme('light');

            themeToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isLight = body.classList.contains('light');
                setTheme(isLight ? 'dark' : 'light');
            });

            // 侧栏收缩/展开
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
            });

            // 处理关闭按钮
            function attachDismiss(btn, badge) {
                btn.addEventListener('click', function (ev) {
                    ev.stopPropagation();
                    badge.remove();
                });
            }

            // 添加日志
            function addLog(path, pageId, pageName, parentName) {
                const badgeDiv = document.createElement('div');
                badgeDiv.className = 'log-badge';
                badgeDiv.innerHTML = `📍 ${path} <span class="dismiss-btn">×</span>`;

                badgeDiv.addEventListener('click', function (e) {
                    if (e.target.classList.contains('dismiss-btn')) return;

                    // 跳转到对应页面
                    renderTable(pageId, pageName, parentName);
                    currentPageDisplay.textContent = `${parentName} / ${pageName}`;

                    // 高亮对应的子菜单
                    document.querySelectorAll('.submenu-item').forEach(item => {
                        item.classList.remove('active');
                        if (item.getAttribute('data-page') === pageId) {
                            item.classList.add('active');
                        }
                    });
                });

                logContainer.appendChild(badgeDiv);
                const dismissBtn = badgeDiv.querySelector('.dismiss-btn');
                attachDismiss(dismissBtn, badgeDiv);
            }

            // 渲染表格
            function renderTable(pageId, pageName, parentName) {
                let tableHtml = '';

                if (pageId === 'trans') {
                    tableHtml = `
                    <div class="table-header">
                        <h2>📊 账变记录</h2>
                        <span class="badge">会员管理</span>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label>地区</label>
                            <div class="region-tag"><i class="fas fa-check-circle" style="color:#2e7d32;"></i> 巴西</div>
                        </div>
                        <div class="filter-item">
                            <label>会员ID</label>
                            <input type="text" placeholder="请输入">
                        </div>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>时间</th><th>会员ID</th><th>类型</th><th>金额</th></tr></thead>
                        <tbody>
                            <tr><td>2026-03-01</td><td>3441505840</td><td>存款</td><td>+1,000</td></tr>
                            <tr><td>2026-03-01</td><td>2983745123</td><td>投注</td><td>-50</td></tr>
                        </tbody>
                    </table>
                `;
                } else if (pageId === 'voucher') {
                    tableHtml = `
                    <div class="table-header">
                        <h2>🎫 兑换码</h2>
                        <span class="badge">福利中心</span>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label>地区</label>
                            <div class="region-tag"><i class="fas fa-check-circle" style="color:#2e7d32;"></i> 巴西</div>
                        </div>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>序号</th><th>兑换码名称</th><th>状态</th></tr></thead>
                        <tbody>
                            <tr><td>1</td><td>3/1充值-额外</td><td><span class="badge-status">进行中</span></td></tr>
                        </tbody>
                    </table>
                `;
                } else {
                    tableHtml = `
                    <div class="table-header">
                        <h2>📊 ${pageName}</h2>
                        <span class="badge">${parentName || '数据'}</span>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-item">
                            <label>地区</label>
                            <div class="region-tag"><i class="fas fa-check-circle" style="color:#2e7d32;"></i> 巴西</div>
                        </div>
                    </div>
                    <table class="data-table">
                        <thead><tr><th>ID</th><th>名称</th><th>状态</th></tr></thead>
                        <tbody>
                            <tr><td>1</td><td>示例数据</td><td><span class="badge-status">正常</span></td></tr>
                        </tbody>
                    </table>
                `;
                }

                tableContainer.innerHTML = tableHtml;
            }

            // 获取所有带子菜单的菜单项
            const menuItems = document.querySelectorAll('.menu-item.has-submenu');

            // 关闭所有子菜单（非收缩状态）
            function closeAllSubmenus() {
                menuItems.forEach(menu => {
                    const submenuId = menu.id.replace('menu', 'submenu');
                    const submenu = document.getElementById(submenuId);
                    if (submenu) {
                        submenu.classList.remove('show');
                        menu.classList.remove('open');
                    }
                });
            }

            // 为所有父菜单添加点击事件（互斥展开）- 仅在非收缩状态生效
            menuItems.forEach(menu => {
                menu.addEventListener('click', function (e) {
                    // 收缩状态下不处理点击展开，因为使用悬浮/点击弹出
                    if (sidebar.classList.contains('collapsed')) {
                        // 收缩状态下点击也可以触发子菜单显示，通过添加一个类来控制
                        // 移除其他菜单的active-submenu类
                        menuItems.forEach(m => m.classList.remove('active-submenu'));
                        this.classList.add('active-submenu');

                        // 10秒后自动移除（可选）
                        setTimeout(() => {
                            this.classList.remove('active-submenu');
                        }, 3000);
                        return;
                    }

                    e.stopPropagation();
                    const submenuId = this.id.replace('menu', 'submenu');
                    const submenu = document.getElementById(submenuId);

                    if (submenu) {
                        // 如果当前点击的菜单已经展开，则关闭它
                        if (submenu.classList.contains('show')) {
                            submenu.classList.remove('show');
                            this.classList.remove('open');
                        } else {
                            // 否则关闭所有，再展开当前
                            closeAllSubmenus();
                            submenu.classList.add('show');
                            this.classList.add('open');
                        }
                    }
                });
            });

            // 为所有子菜单项添加点击事件
            document.querySelectorAll('.submenu-item').forEach(item => {
                item.addEventListener('click', function (e) {
                    e.stopPropagation();

                    const pageId = this.getAttribute('data-page');
                    const pageName = this.getAttribute('data-path') || this.querySelector('.submenu-text')?.textContent || '未知';
                    const parentName = this.closest('.menu-group')?.querySelector('.menu-text')?.textContent || '';

                    // 移除所有子菜单激活态
                    document.querySelectorAll('.submenu-item').forEach(sub => sub.classList.remove('active'));
                    this.classList.add('active');

                    addLog(pageName, pageId, pageName, parentName);
                    renderTable(pageId, pageName, parentName);
                    currentPageDisplay.textContent = `${parentName} / ${pageName}`;
                });
            });

            // 初始加载默认页面
            setTimeout(() => {
                renderTable('withdraw', '总出款记录', '商户财务管理');
                currentPageDisplay.textContent = '商户财务管理 / 总出款记录';
                document.querySelectorAll('.submenu-item').forEach(item => {
                    if (item.getAttribute('data-page') === 'withdraw') {
                        item.classList.add('active');
                    }
                });
            }, 100);

            logContainer.addEventListener('click', (e) => e.stopPropagation());
        })();
    </script>
</body>

</html>
